<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panorama de Atendimentos | Dashboard</title>
  <meta name="description"
    content="Dashboard de Panorama de Atendimentos - Visualização de indicadores, gráficos e desempenho por profissional." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="dashboard-wrapper">

    <!-- ===== SIDEBAR ===== -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <img src="logo.png" alt="Galileu Saúde 360" style="width: 100%; max-width: 180px; object-fit: contain;">
      </div>

      <nav class="sidebar-nav" role="navigation" aria-label="Menu principal">
        <a href="#overview" class="nav-item" data-route="overview" id="nav-overview" aria-label="Visão Geral">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7" rx="1" />
            <rect x="14" y="3" width="7" height="7" rx="1" />
            <rect x="14" y="14" width="7" height="7" rx="1" />
            <rect x="3" y="14" width="7" height="7" rx="1" />
          </svg>
          <span>Visão Geral</span>
        </a>
        <a href="#professionals" class="nav-item" data-route="professionals" id="nav-professionals"
          aria-label="Profissionais">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <path d="M23 21v-2a4 4 0 00-3-3.87" />
            <path d="M16 3.13a4 4 0 010 7.75" />
          </svg>
          <span>Profissionais</span>
        </a>
        <a href="#reports" class="nav-item" data-route="reports" id="nav-reports" aria-label="Relatórios">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" />
            <polyline points="14 2 14 8 20 8" />
            <line x1="16" y1="13" x2="8" y2="13" />
            <line x1="16" y1="17" x2="8" y2="17" />
            <polyline points="10 9 9 9 8 9" />
          </svg>
          <span>Relatórios</span>
        </a>
        <a href="#settings" class="nav-item" data-route="settings" id="nav-settings" aria-label="Configurações">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3" />
            <path
              d="M19.07 4.93l-1.41 1.41M4.93 4.93l1.41 1.41M12 2v2M12 20v2M2 12h2M20 12h2M19.07 19.07l-1.41-1.41M4.93 19.07l1.41-1.41" />
          </svg>
          <span>Configurações</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="sidebar-year-badge">2026</div>
        <span>1º Semestre</span>
      </div>
    </aside>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="main-content" id="main-content">

      <!-- Fixed Header -->
      <header class="top-header" id="top-header">
        <div class="header-left">
          <button class="menu-toggle" id="menuToggle" aria-label="Abrir menu">
            <span></span><span></span><span></span>
          </button>
          <div class="header-titles">
            <h1 class="page-title" id="header-title">Panorama de Atendimentos</h1>
            <p class="page-subtitle" id="header-subtitle">Consolidação dos atendimentos realizados e não realizados no
              primeiro semestre de 2026.</p>
          </div>
        </div>
        <div class="header-right">
          <div class="header-period" style="display:flex; align-items:center; gap:8px;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15">
              <rect x="3" y="4" width="18" height="18" rx="2" />
              <line x1="16" y1="2" x2="16" y2="6" />
              <line x1="8" y1="2" x2="8" y2="6" />
              <line x1="3" y1="10" x2="21" y2="10" />
            </svg>
            <input type="date" id="globalStartMonth" class="date-select" value="2026-01-01" min="2026-01-01"
              max="2026-06-30">
            <span style="font-size:0.8rem; color:var(--text-muted);">até</span>
            <input type="date" id="globalEndMonth" class="date-select" value="2026-06-30" min="2026-01-01"
              max="2026-06-30">
          </div>
          <button class="theme-toggle-btn" id="headerThemeToggle" aria-label="Alternar modo escuro"
            title="Alternar modo escuro">
            <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="5" />
              <line x1="12" y1="1" x2="12" y2="3" />
              <line x1="12" y1="21" x2="12" y2="23" />
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
              <line x1="1" y1="12" x2="3" y2="12" />
              <line x1="21" y1="12" x2="23" y2="12" />
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
            </svg>
            <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
            </svg>
        </div>
      </header>

      <!-- Dynamic Page Content -->
      <div id="page-content" class="page-content" role="main"></div>

    </main>
  </div>

  <!-- Sidebar overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <script src="data.js"></script>
  <script src="router.js"></script>
  <script src="app.js"></script>
</body>

</html>
