  </g>
  
  <!-- "galileu" text (Dark Blue) -->
  <text x="105" y="80" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="76" letter-spacing="-2" fill="#1c3a6b">galileu</text>
  
  <!-- "SAÚDE 360" text (Dark Blue) -->
  <text x="110" y="118" font-family="system-ui, -apple-system, sans-serif" font-weight="500" font-size="28" letter-spacing="5" fill="#1c3a6b">SAÚDE 360</text>
  
